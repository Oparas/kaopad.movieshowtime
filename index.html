
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.top-bar { padding: 1.5rem 0 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
.site-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.5px; }
.site-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; }
.search-wrap { flex: 1 1 200px; position: relative; }
.search-wrap input { width: 100%; padding-left: 32px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--color-text-secondary); pointer-events: none; }
select { padding: 0 10px; height: 36px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; }
.date-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.date-tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; color: var(--color-text-secondary); background: var(--color-background-primary); transition: all 0.15s; }
.date-tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.movie-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.movie-poster { width: 100%; aspect-ratio: 2/3; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.poster-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.poster-fallback { font-size: 40px; opacity: 0.2; }
.rating-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.65); color: #fff; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: var(--border-radius-md); }
.score-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.65); color: #f5c518; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: var(--border-radius-md); }
.movie-info { padding: 12px; }
.movie-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.movie-orig { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
.movie-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; }
.genre-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.genre-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--color-background-secondary); color: var(--color-text-secondary); }
.showtimes-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 6px; font-weight: 500; }
.cinema-block { margin-bottom: 8px; }
.cinema-name { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.times-row { display: flex; gap: 4px; flex-wrap: wrap; }
.time-btn { padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); transition: all 0.12s; }
.time-btn:hover { background: var(--color-text-primary); color: var(--color-background-primary); }
.trailer-btn { display: block; width: 100%; padding: 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); margin-top: 8px; text-align: center; transition: all 0.12s; }
.trailer-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
.trailer-btn:disabled { opacity: 0.4; cursor: default; }
.no-results { text-align: center; padding: 3rem; color: var(--color-text-secondary); font-size: 14px; }
.loading-state { text-align: center; padding: 3rem; color: var(--color-text-secondary); font-size: 14px; }
.error-state { text-align: center; padding: 2rem; color: var(--color-text-danger, #c0392b); font-size: 13px; background: var(--color-background-danger, #fdf0f0); border-radius: var(--border-radius-md); }
.result-count { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; }
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 1.5rem; max-width: 580px; width: 92%; position: relative; }
.modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--color-text-secondary); line-height: 1; }
.modal-title { font-size: 17px; font-weight: 500; margin-bottom: 4px; color: var(--color-text-primary); }
.modal-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; line-height: 1.6; }
.video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: var(--border-radius-md); overflow: hidden; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px; }
.video-wrap iframe { width: 100%; height: 100%; border: none; }
</style>

<div class="top-bar">
  <div class="site-title">BKK Showtimes</div>
  <div class="site-sub">รอบฉายหนังในกรุงเทพ — ข้อมูลจาก TMDb</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="ค้นหาชื่อหนัง..." oninput="filterRender()">
  </div>
  <select id="genre-filter" onchange="filterRender()">
    <option value="">ทุกแนว</option>
  </select>
</div>

<div class="date-tabs" id="date-tabs"></div>
<div class="result-count" id="result-count"></div>
<div id="movie-grid" class="movie-grid"></div>

<div class="modal-bg" id="trailer-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&#215;</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-overview"></div>
    <div class="video-wrap" id="video-wrap">กำลังโหลดเทรลเลอร์...</div>
  </div>
</div>

<script>
const TMDB_KEY = '03c27d4cf448b1e3f53f5eeb13688e1b';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

const FAKE_SHOWTIMES = {
  'Major RCA': ['10:15','13:00','16:20','19:45','22:30'],
  'Major Ekamai': ['11:00','14:30','18:00','21:15'],
  'SF CentralWorld': ['10:30','13:45','17:00','20:30'],
  'SF Siam Paragon': ['11:30','15:00','18:30','22:00'],
  'Paragon Cineplex': ['10:00','13:30','17:15','20:45'],
  'Central Embassy': ['12:00','15:30','19:00','21:45'],
};
const CINEMAS = Object.keys(FAKE_SHOWTIMES);

const GENRE_MAP = {28:'แอคชั่น',12:'ผจญภัย',16:'แอนิเมชั่น',35:'ตลก',80:'อาชญากรรม',99:'สารคดี',18:'ดราม่า',10751:'ครอบครัว',14:'แฟนตาซี',36:'ประวัติศาสตร์',27:'สยองขวัญ',10402:'เพลง',9648:'ลึกลับ',10749:'โรแมนติก',878:'ไซ-ไฟ',10770:'ทีวี',53:'ทริลเลอร์',10752:'สงคราม',37:'คาวบอย'};

const today = new Date();
const days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function addDays(d,n){ let x=new Date(d); x.setDate(x.getDate()+n); return x; }
function fmtLabel(d,i){ return i===0?'วันนี้': i===1?'พรุ่งนี้': days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]; }
const dateOptions = [0,1,2,3,4].map(i=>({i, label: fmtLabel(addDays(today,i),i)}));

let selectedDate = 0;
let allMovies = [];
let allGenreIds = new Set();

function buildDateTabs(){
  document.getElementById('date-tabs').innerHTML = dateOptions.map(d=>`
    <button class="date-tab ${d.i===selectedDate?'active':''}" onclick="selectDate(${d.i})">${d.label}</button>
  `).join('');
}

function selectDate(i){ selectedDate=i; buildDateTabs(); filterRender(); }

function showtimesForMovie(movieId, dateOffset){
  const seed = movieId + dateOffset;
  const cinemaCount = 2 + (seed % 3);
  const picked = [];
  const shuffled = [...CINEMAS].sort((a,b)=> ((movieId*7+b.length*3)%5) - ((movieId*3+a.length*7)%5));
  for(let i=0;i<cinemaCount;i++) picked.push(shuffled[i]);
  return picked.map(c=>{
    const times = FAKE_SHOWTIMES[c];
    const count = 3 + (seed + c.length) % 3;
    return { cinema: c, times: times.slice(0, count) };
  });
}

async function fetchNowPlaying(){
  document.getElementById('movie-grid').innerHTML = '<div class="loading-state">กำลังโหลดข้อมูลหนัง...</div>';
  try {
    const res = await fetch(`${TMDB_BASE}/movie/now_playing?api_key=${TMDB_KEY}&language=th-TH&region=TH&page=1`);
    const data = await res.json();
    if(!data.results) throw new Error('No results');
    allMovies = data.results.filter(m=>m.poster_path);
    allMovies.forEach(m=> m.genre_ids.forEach(g=> allGenreIds.add(g)));
    buildGenreFilter();
    filterRender();
  } catch(e){
    document.getElementById('movie-grid').innerHTML = `<div class="error-state">โหลดข้อมูลไม่สำเร็จ: ${e.message}</div>`;
  }
}

function buildGenreFilter(){
  const sel = document.getElementById('genre-filter');
  const opts = ['<option value="">ทุกแนว</option>'];
  allGenreIds.forEach(id=>{ if(GENRE_MAP[id]) opts.push(`<option value="${id}">${GENRE_MAP[id]}</option>`); });
  sel.innerHTML = opts.join('');
}

function filterRender(){
  const q = document.getElementById('search').value.toLowerCase();
  const genre = document.getElementById('genre-filter').value;
  let filtered = allMovies.filter(m=>{
    if(q && !m.title.toLowerCase().includes(q) && !(m.original_title||'').toLowerCase().includes(q)) return false;
    if(genre && !m.genre_ids.includes(Number(genre))) return false;
    return true;
  });
  document.getElementById('result-count').textContent = `แสดง ${filtered.length} เรื่อง`;
  if(!filtered.length){
    document.getElementById('movie-grid').innerHTML = '<div class="no-results">ไม่พบหนังที่ตรงกับเงื่อนไข</div>';
    return;
  }
  const grid = document.getElementById('movie-grid');
  grid.innerHTML = filtered.map(m=>{
    const genres = (m.genre_ids||[]).slice(0,3).map(id=>GENRE_MAP[id]||'').filter(Boolean);
    const score = m.vote_average ? (m.vote_average).toFixed(1) : '';
    const shows = showtimesForMovie(m.id, selectedDate);
    const showHTML = shows.map(s=>`
      <div class="cinema-block">
        <div class="cinema-name">${s.cinema}</div>
        <div class="times-row">${s.times.map(t=>`<button class="time-btn">${t}</button>`).join('')}</div>
      </div>`).join('');
    return `
    <div class="movie-card">
      <div class="movie-poster">
        <img class="poster-img" src="${IMG_BASE}${m.poster_path}" alt="${m.title}" onerror="this.style.display='none'">
        ${score?`<div class="score-badge">★ ${score}</div>`:''}
      </div>
      <div class="movie-info">
        <div class="movie-title" title="${m.title}">${m.title}</div>
        ${m.original_title!==m.title?`<div class="movie-orig">${m.original_title}</div>`:''}
        <div class="movie-meta">${m.release_date?m.release_date.slice(0,4):''}</div>
        <div class="genre-tags">${genres.map(g=>`<span class="genre-tag">${g}</span>`).join('')}</div>
        <div class="showtimes-label">รอบฉาย — ${dateOptions[selectedDate].label}</div>
        ${showHTML}
        <button class="trailer-btn" onclick="openTrailer(${m.id},'${m.title.replace(/'/g,"\\'")}','${(m.overview||'').slice(0,120).replace(/'/g,"\\'")}')">&#9654; ดูเทรลเลอร์</button>
      </div>
    </div>`;
  }).join('');
}

async function openTrailer(id, title, overview){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-overview').textContent = overview + (overview.length>=120?'...':'');
  document.getElementById('video-wrap').innerHTML = 'กำลังโหลด...';
  document.getElementById('trailer-modal').classList.add('open');
  try {
    const res = await fetch(`${TMDB_BASE}/movie/${id}/videos?api_key=${TMDB_KEY}&language=en-US`);
    const data = await res.json();
    const yt = (data.results||[]).find(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'));
    if(yt){
      document.getElementById('video-wrap').innerHTML = `<iframe src="https://www.youtube.com/embed/${yt.key}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
    } else {
      document.getElementById('video-wrap').innerHTML = 'ไม่พบเทรลเลอร์ใน YouTube';
    }
  } catch(e){
    document.getElementById('video-wrap').innerHTML = 'โหลดเทรลเลอร์ไม่สำเร็จ';
  }
}

function closeModal(){
  document.getElementById('trailer-modal').classList.remove('open');
  document.getElementById('video-wrap').innerHTML = '';
}

buildDateTabs();
fetchNowPlaying();
</script>
